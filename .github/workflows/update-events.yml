name: Update event data

on:
  workflow_dispatch:
  schedule:
    - cron: "18 22 * * *"

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fetch:events
      - run: npm test
      - run: npm run build
      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update event data"
          file_pattern: public/data/events.json public/data/venues.json public/data/fetch-log.json public/data/fetch-errors.json
