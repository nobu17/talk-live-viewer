name: Deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # Tuesday/Thursday/Sunday 27:00 JST = Wednesday/Friday/Monday 03:00 JST.
    # GitHub Actions cron is UTC, so this runs Monday/Wednesday/Saturday 18:00 UTC.
    - cron: "0 18 * * 1,3,6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run fetch:events
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
